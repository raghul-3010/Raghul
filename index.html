<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luv u Kuthi | Narrative Flow</title>
    <style>
        :root {
            --primary-blue: #38bdf8;
            --bg-dark: #020617;
        }

        body { 
            margin: 0; 
            background: #020617;
            overflow-x: hidden; 
            cursor: none; 
            color: white;
            font-family: 'Cambria', 'Georgia', serif;
        }

        canvas { position: fixed; top: 0; left: 0; outline: none; z-index: 1; pointer-events: none; }

        #custom-cursor {
            position: fixed; top: 0; left: 0; width: 10px; height: 10px;
            background: var(--primary-blue); border-radius: 50%;
            pointer-events: none; z-index: 10000;
            box-shadow: 0 0 15px var(--primary-blue), 0 0 30px var(--primary-blue);
            transform: translate3d(0, 0, 0);
            will-change: transform;
        }

        .slide {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 0 10%;
            box-sizing: border-box;
        }

    

        .line-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 10%;
            box-sizing: border-box;
        }

        #line-1 { opacity: 0; transform: translateY(100px); }
        #line-2 { opacity: 0; transform: translateX(100vw); }

        /* APPLE SLICE ELEMENTS */
        .slice-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            z-index: 5;
            pointer-events: none;
        }

        .slice-left, .slice-right {
            width: 50%; height: 100%;
            background: var(--bg-dark);
            will-change: transform;
        }

        .cover-title {
            font-weight: 700;
            font-size: clamp(3rem, 10vw, 7rem);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            line-height: 1;
            margin: 0;
            background: linear-gradient(to bottom, #ffffff 40%, var(--primary-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
        }

        .section-header {
            font-size: 1rem;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--primary-blue);
            margin-bottom: 20px;
        }

        .body-text {
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
            line-height: 1.6;
            max-width: 900px;
            margin: 10px 0;
        }

        .highlight-blue { color: var(--primary-blue); font-weight: bold; }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>

    <section class="slide" id="slide-1">
        <h1 class="cover-title" id="main-title">Love You <br>Kuthi...</h1>
    </section>

<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
        

        /* --- THREE.JS --- */
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 7); 
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const count = 40000; 
        const sphereData = new Float32Array(count * 3);
        const terrainBaseData = new Float32Array(count * 3); 
        const currentPositions = new Float32Array(count * 3);

        for (let i = 0; i < count; i++) {
            const i3 = i * 3;
            const radius = 2.5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);
            sphereData[i3] = radius * Math.sin(phi) * Math.cos(theta);
            sphereData[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            sphereData[i3 + 2] = radius * Math.cos(phi);
            terrainBaseData[i3] = (Math.random() - 0.5) * 40; 
            terrainBaseData[i3 + 2] = (Math.random() - 0.5) * 25; 
            currentPositions[i3] = sphereData[i3];
            currentPositions[i3 + 1] = sphereData[i3 + 1];
            currentPositions[i3 + 2] = sphereData[i3 + 2];
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute("position", new THREE.BufferAttribute(currentPositions, 3));
        const material = new THREE.PointsMaterial({ size: 0.012, color: 0x38bdf8, transparent: true, blending: THREE.AdditiveBlending, opacity: 1 });
        const points = new THREE.Points(geometry, material);
        points.rotation.x = -0.2; 
        scene.add(points);

        /* --- STABLE CURSOR LOGIC --- */
        const cursor = document.getElementById("custom-cursor");
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        window.addEventListener("mousemove", (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        /* --- GSAP ANIMATIONS --- */
        const morphProxy = { fraction: 0 };
        const masterTL = gsap.timeline();

        masterTL.to("#main-title", { opacity: 1, y: -20, duration: 2.5, ease: "power3.out", delay: 0.5 })
                .to(morphProxy, { fraction: 1, duration: 5, ease: "expo.inOut" }, "-=1.5");

        /* --- MAIN RENDER LOOP --- */
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001; 

            // Smooth Cursor - Update every frame independently
            cursorX += (mouseX - cursorX) * 0.12;
            cursorY += (mouseY - cursorY) * 0.12;
            cursor.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0)`;

            // Particle Terrain Logic - Design Properties Preserved
            const pos = geometry.attributes.position.array;
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const waveHeight = (Math.sin(terrainBaseData[i3] * 0.6 + time) * 0.5 + Math.cos(terrainBaseData[i3+2] * 0.8 + time * 0.5) * 0.4);
                const targetY = waveHeight - 2.0; 
                pos[i3] = sphereData[i3] + (terrainBaseData[i3] - sphereData[i3]) * morphProxy.fraction;
                pos[i3 + 2] = sphereData[i3 + 2] + (terrainBaseData[i3+2] - sphereData[i3+2]) * morphProxy.fraction;
                pos[i3 + 1] = sphereData[i3 + 1] + (targetY - sphereData[i3 + 1]) * morphProxy.fraction;
            }
            geometry.attributes.position.needsUpdate = true;
            points.rotation.y += 0.0002; 

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener("resize", () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
